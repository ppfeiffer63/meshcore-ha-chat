name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    # Skip on non-canonical repos (e.g. the private dev mirror); HACS
    # and Hassfest only make sense on the public canonical repo.
    if: github.repository == 'mwolter805/meshcore-ha-chat'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        # Pinned to 2026-04-07 HEAD on home-assistant/actions/master.
        # Bump on a quarterly cadence to take security and behaviour
        # fixes; verify with a full validate.yaml run after each bump.
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    if: github.repository == 'mwolter805/meshcore-ha-chat'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HACS validation
        # Pinned to 2026-01-26 HEAD on hacs/action/main.
        # Bump on a quarterly cadence to take security and behaviour
        # fixes; verify with a full validate.yaml run after each bump.
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485
        with:
          category: integration
