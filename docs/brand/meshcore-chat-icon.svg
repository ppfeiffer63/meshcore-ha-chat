<?xml version="1.0" encoding="UTF-8"?>
<!--
  MeshCore Chat — square icon (256x256 source).
  Design: Option A — upstream MeshCore radio-broadcast icon centered, with a
  chat bubble modifier in the lower-right "knockout" disc for clear separation.
  Background: #1A2238 (matches upstream MeshCore brand navy).
  Foreground: #FFFFFF.
  Use this SVG as the source of truth; render PNGs at 256 and 512 for the
  home-assistant/brands PR via scripts/render-brand-pngs.py.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Rounded-square background -->
  <rect x="0" y="0" width="256" height="256" rx="44" fill="#1A2238"/>

  <!-- Centered radio-broadcast icon: dot + 2 inner arcs + 2 outer arcs.
       Arcs open sideways (left arc opens left, right arc opens right). -->
  <g transform="translate(128 128)" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round">
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="none"/>
    <path d="M -34 -28 A 44 44 0 0 0 -34 28"/>
    <path d="M  34 -28 A 44 44 0 0 1  34 28"/>
    <path d="M -62 -50 A 78 78 0 0 0 -62 50"/>
    <path d="M  62 -50 A 78 78 0 0 1  62 50"/>
  </g>

  <!-- Chat bubble modifier in lower-right.
       Knockout disc of bg color creates clean separation from radio arcs. -->
  <g transform="translate(188 188)">
    <circle cx="0" cy="0" r="58" fill="#1A2238"/>
    <!-- Bubble: rounded rectangle with downward-pointing tail -->
    <path d="M -34 -28
             Q -42 -28 -42 -20
             L -42 18
             Q -42 26 -34 26
             L -12 26
             L -3 38
             L 6 26
             L 34 26
             Q 42 26 42 18
             L 42 -20
             Q 42 -28 34 -28
             Z" fill="#FFFFFF"/>
    <!-- 3 dots = "typing/messaging" indicator -->
    <circle cx="-18" cy="0" r="4.5" fill="#1A2238"/>
    <circle cx="0"   cy="0" r="4.5" fill="#1A2238"/>
    <circle cx="18"  cy="0" r="4.5" fill="#1A2238"/>
  </g>
</svg>
